<!DOCTYPE html>
<html lang="es">
<head>
    <!-- INTEGRACION DEL FRAMEWORK BOOTSTRAP PARA DISEÑO Y ESTILO WEB -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Design</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="assets/img/logo.ico">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS PROPIO -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container-fluid px-4">

        <!-- HEADER -->
        <div class="row mt-4">
            <div class="col-12 topbar text-white text-center py-4">
                <h1 class="m-0 fw-bold">Profile Card Design</h1>
            </div>
        </div>

        <!-- SECCION DE TARJETAS -->
        <div class="row justify-content-center g-4 py-5">

            <!-- CARD 1 -->
            <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                <div class="profile-card text-center">
                    <img src="assets/img/personaN1.png" class="profile-avatar" alt="Person One">

                    <h5 class="profile-name">Person One</h5>

                    <p class="profile-text">
                        Esta es la persona número uno para revisar la tarjeta de información.
                    </p>

                    <img src="assets/img/redes.jpg" class="social-img" alt="Redes sociales">
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                <div class="profile-card text-center">
                    <img src="assets/img/personaN2.png" class="profile-avatar" alt="Person Two">

                    <h5 class="profile-name">Person Two</h5>

                    <p class="profile-text">
                        Esta es la persona número dos para revisar la tarjeta de información.
                    </p>

                    <img src="assets/img/redes.jpg" class="social-img" alt="Redes sociales">
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                <div class="profile-card text-center">
                    <img src="assets/img/personaN3.png" class="profile-avatar" alt="Person Three">

                    <h5 class="profile-name">Person Three</h5>

                    <p class="profile-text">
                        Esta es la persona número tres para revisar la tarjeta de información.
                    </p>

                    <img src="assets/img/redes.jpg" class="social-img" alt="Redes sociales">
                </div>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="row">
            <div class="col-12 footerbar text-white text-center py-4">
                <h2 class="m-0">HTML CSS BOOTSTRAP</h2>
            </div>
        </div>

    </div>

</body>
</html>
